name: Refresh HubSpot data

# Pulls fresh HubSpot data and commits public/data.json.
# Cloudflare Pages (connected to this repo) auto-deploys on every push.

on:
  schedule:
    - cron: '0 * * * *'   # hourly on the hour (UTC)
  workflow_dispatch: {}    # also runs manually from the Actions tab

permissions:
  contents: write          # allow committing data.json

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with: { node-version: '20' }

      - name: Fetch HubSpot data
        env:
          HUBSPOT_TOKEN: ${{ secrets.HUBSPOT_TOKEN }}
        run: node scripts/fetch.mjs

      - name: Commit refreshed data.json
        run: |
          git config user.name  "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git add public/data.json
          if git diff --cached --quiet; then
            echo "No data changes — nothing to commit."
          else
            git commit -m "chore: refresh HubSpot data $(date -u +%FT%TZ)"
            git push
          fi
